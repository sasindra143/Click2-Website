# Netlify configuration for Click2Website frontend

[build]
  # The directory to deploy
  directory = "client/dist"
  # The build command
  command = "cd client && npm install && npm run build"
  # The directory where the build process places its output
  publish = "client/dist"

[build.environment]
  # Critical environment variables for build
  NODE_ENV = "production"
  NODE_VERSION = "18"

# Redirect all routes to index.html (for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control for different file types
[[headers]]
  # HTML files - no cache
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # JS/CSS files - cache for 1 year (versioned by build)
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # API calls - no cache
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Context-specific configuration for preview/staging
[context.deploy-preview]
  command = "cd client && npm install && npm run build"

[context.branch-deploy]
  command = "cd client && npm install && npm run build"

[edge_functions]
  # Optional: Configure edge functions for serverless operations
